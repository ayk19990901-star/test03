<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Nest Cafe</title>
    <meta
      name="description"
      content="こだわりのコーヒーと手作りスイーツを提供するカフェ"
    />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ファビコン -->
    <link rel="icon" type="image/png" href="images/favicon.png" />

    <!--リセットCSS-->
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />

    <!--Google フォント-->
    <link rel="preconnect" href="https://font.googleapis.com" />
    <link rel="preconnect" href="https://font.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Philosopher&display=swap"
      rel="stylesheet"
    />
    <!--オリジナルCSS-->
    <link rel="stylesheet" href="style.css" />

    <!-- OGP -->
    <meta
      property="og:url"
      content="https://ayk19990901-star.github.io/test/index.html"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nest Cafe Home" />
    <meta
      property="og:description"
      content="こだわりのコーヒーと手作りスイーツを提供するカフェ"
    />
    <meta
      property="og:image"
      content="https://ayk19990901-star.github.io/test//images/ogp.jpg"
    />
  </head>

  <style>
    .btn-menu {
      position: absolute;
      top: 12px;
      right: 12px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: rgb(7, 7, 7);
      padding: 0.5rem 1rem;
    }

    .main-nav {
      width: 0;
      position: absolute;
      top: 25px;
      right: 0;
      overflow: hidden;
      transition: 0.5s;
      display: block;
    }
    .main-nav li {
      text-align: center;
      margin: 1.5rem 0;
    }
    .main-nav.open-menu {
      width: 200px;
    }
  </style>
  <body>
    <div class="cover cover-home">
      <header class="page-header wrapper">
        <h1 class="align-center">
          <a href="indev.html"
            ><img class="logo" src="images/logo.svg" alt="Nest cafeホーム"
          /></a>
        </h1>
        <nav>
          <button class="btn-menu">Menu</button>
          <ul class="main-nav font-english">
            <li><a href="news.html">News</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </header>
      <h2 class="page-title font-english">Made for Your Moments.</h2>
    </div>

    <section class="about">
      <h3 class="heading-large font-english">About Cafe</h3>
      <p>
        当店では、こだわりのコーヒーと手作りスイーツを楽しめるカフェです。
        木のぬくもりを感じる落ち着いた空間で、忙しい日常を忘れてゆったりとした時間をお過ごしください。
        おひとり様はもちろん、ご友人とのカフェタイムにもご利用ください。
      </p>
      <div class="align-center">
        <a class="btn" href="menu.html">メニューを見る</a>
      </div>
    </section>

    <footer class="page-footer">
      <h3 class="heading-large font-english">Information</h3>
      <table class="info">
        <tr>
          <th>住所</th>
          <td>東京都港区六本木 0-0 ◯◯◯</td>
        </tr>
        <tr>
          <th>電話</th>
          <td>03-2222-XXXX</td>
        </tr>

        <tr>
          <th>店休日</th>

          <td>木曜</td>
        </tr>
      </table>
      <div class="copyright">
        <small>&copy; 2010 Nest Cafe</small>
      </div>
    </footer>
  </body>
  <script>
    const btn = document.querySelector(".btn-menu");
    const nav = document.querySelector(".main-nav");

    btn.addEventListener("click", () => {
      nav.classList.toggle("open-menu");

      if (btn.innerHTML === "Menu") {
        btn.innerHTML = "閉じる";
      } else {
        btn.innerHTML = "メニュー";
      }
    });
  </script>
</html>
